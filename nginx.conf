# Nginx configuration for latestbalita.ph
# Next.js (front-end) + WordPress (headless CMS) on the same domain
#
# INSTRUCTIONS:
# In aaPanel, go to Website > latestbalita.ph > Settings > Configuration
# Replace the existing config with this content (keep the SSL section if already configured)

server {
    listen 80;
    listen [::]:80;
    server_name latestbalita.ph www.latestbalita.ph;

    # Redirect HTTP to HTTPS (uncomment after SSL is set up)
    # return 301 https://$server_name$request_uri;

    # --- WordPress paths (PHP) ---
    # WordPress root directory
    set $wp_root /www/wwwroot/latestbalita.ph;

    # WordPress admin, login, API, and static assets
    location /wp-admin {
        root $wp_root;
        index index.php;
        try_files $uri $uri/ /wp-admin/index.php?$args;
    }

    location /wp-login.php {
        root $wp_root;
        include enable-php-82.conf;
    }

    location /wp-json {
        root $wp_root;
        try_files $uri $uri/ /index.php?$args;
    }

    location /wp-content {
        root $wp_root;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /wp-includes {
        root $wp_root;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /xmlrpc.php {
        deny all;
        return 403;
    }

    # Handle PHP files for WordPress paths
    location ~ \.php$ {
        root $wp_root;
        include enable-php-82.conf;
        fastcgi_param SCRIPT_FILENAME $wp_root$fastcgi_script_name;
    }

    # --- Next.js (everything else) ---
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }

    # Next.js static assets (long cache)
    location /_next/static {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Favicon, robots, sitemap served by Next.js
    location = /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
    }

    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
    }

    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    access_log /www/wwwlogs/latestbalita.ph.log;
    error_log /www/wwwlogs/latestbalita.ph.error.log;
}
